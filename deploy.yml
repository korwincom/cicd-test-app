---
- name: Spring Boot Docker Deploy Playbook
  hosts: dev_server
  tasks:

    # 1. GitHub 최신 소스 가져오기
    - name: Pull latest code from GitHub
      git:
        repo: 'https://github.com/korwincom/cicd-test-app.git'
        dest: /home/wincomadmin/Project/cicd-test-app
        update: yes

    # 2. 프로젝트 빌드하기
    - name: Build Spring Boot application with Gradle
      shell: ./gradlew clean build
      args:
        chdir: /home/wincomadmin/Project/cicd-test-app

    # 3. 도커 이미지 빌드하기
    - name: Build Docker Image
      docker_image:
        name: cicd-test-app
        build:
          path: /home/wincomadmin/Project/cicd-test-app
        source: build

    # 4. 기존 1호기 컨테이너 삭제하기
    - name: Stop and remove existing instance 1
      docker_container:
        name: cicd-test-app-instance-1
        state: absent

    # 5. 기존 2호기 컨테이너 삭제하기
    - name: Stop and remove existing instance 2
      docker_container:
        name: cicd-test-app-instance-2
        state: absent

    # 6. 새 1호기 컨테이너 실행하기
    - name: Start instance 1
      docker_container:
        name: cicd-test-app-instance-1
        image: cicd-test-app
        state: started
        published_ports:
          - "8091:8080"

    # 7. 새 2호기 컨테이너 실행하기
    - name: Start instance 2
      docker_container:
        name: cicd-test-app-instance-2
        image: cicd-test-app
        state: started
        published_ports:
          - "8092:8080"
